services:
  # Service 1: Train the model and export artifacts to a shared volume
  model-training:
    image: python:3.10-slim
    container_name: exercise_trainer
    working_dir: /app
    volumes:
      - ./src:/app/src
      - ./requirements.txt:/app/requirements.txt
      - model_exchange:/exchange   # shared volume for artifacts
    command: >
      sh -c "pip install -r requirements.txt &&
             python src/model_training.py &&
             cp exercise_model.keras /exchange/ &&
             cp scaler_X.pkl        /exchange/ &&
             cp scaler_y.pkl        /exchange/ &&
             cp activity_data.json /exchange/"

  # Service 2: Serve the model
  serving:
    image: python:3.10-slim
    container_name: exercise_serving
    working_dir: /app
    ports:
      - "5001:5001"
    volumes:
      - ./src:/app/src
      - ./requirements.txt:/app/requirements.txt
      - model_exchange:/exchange   # read artifacts from shared volume
    depends_on:
      model-training:
        condition: service_completed_successfully
    command: >
      sh -c "pip install --trusted-host pypi.python.org -r requirements.txt &&
             cp /exchange/exercise_model.keras . &&
             cp /exchange/scaler_X.pkl        . &&
             cp /exchange/scaler_y.pkl        . &&
             cp /exchange/activity_data.json . &&
             python src/main.py"

volumes:
  model_exchange:
