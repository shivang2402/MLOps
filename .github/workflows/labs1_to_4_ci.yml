name: Labs 1-4 CI Pipeline

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "Labs/Docker_Calorie_Predictor/**"
      - ".github/workflows/labs1_to_4_ci.yml"
  pull_request:
    branches: [ main ]
    paths:
      - "Labs/Docker_Calorie_Predictor/**"

jobs:
  test-train-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Labs/Docker_Calorie_Predictor

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests (Lab1)
        run: pytest -q

      - name: Train model with config (Lab2/Lab3)
        run: python src/model_training.py --config config/training_config_ci.json

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: exercise-calorie-artifacts
          path: |
            Labs/Docker_Calorie_Predictor/exercise_model.keras
            Labs/Docker_Calorie_Predictor/scaler_X.pkl
            Labs/Docker_Calorie_Predictor/scaler_y.pkl
            Labs/Docker_Calorie_Predictor/activity_data.json
            Labs/Docker_Calorie_Predictor/training_metrics.json

      - name: Build Docker image (Lab4)
        run: docker build -t exercise-calorie-predictor:ci -f dockerfile .
