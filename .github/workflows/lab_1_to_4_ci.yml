name: Lab 1-4 CI Pipeline

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "Labs/GitHub_Actions_Exercise_Predictor/**"
      - ".github/workflows/lab_1_to_4_ci.yml"

jobs:
  test-train-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Labs/GitHub_Actions_Exercise_Predictor

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests (Lab 1)
        run: pytest -v

      - name: Train and evaluate (Lab 2/3)
        run: |
          timestamp=$(date '+%Y%m%d%H%M%S')
          python src/train_model.py --timestamp "$timestamp" --config "config/training_config.json"
          python src/evaluate_model.py --timestamp "$timestamp" --config "config/training_config.json"

      - name: Upload artifacts (Lab 3/4)
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts-${{ github.run_id }}
          path: |
            Labs/GitHub_Actions_Exercise_Predictor/**_metrics.json
            Labs/GitHub_Actions_Exercise_Predictor/**_train_summary.json
            Labs/GitHub_Actions_Exercise_Predictor/model_*.joblib
